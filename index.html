<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초은하 현상금 사냥꾼 길드 터미널</title>
    <style>
        /* 1. 전체 설정 ( fixed 배경 & 테마색 통일 ) */
        body {
            margin: 0; padding: 0;
            background-image: url('bg.png'); /* 배경 이미지 파일명 확인 필수! */
            background-size: cover; background-position: center; background-repeat: no-repeat;
            background-color: #05120E; color: #E0FFF2; font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden; user-select: none; width: 100vw; height: 100vh;
        }

        /* 2. 화면 전환 레이아웃 */
        .screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease-in-out;
        }
        .screen.active { opacity: 1; pointer-events: auto; }

        /* 3. 메인 로비 화면 (흩뿌려진 UI) */
        .main-title {
            position: absolute; top: 5%; width: 100%; text-align: center;
            font-size: 2.5rem; color: #00FF9D; text-shadow: 0 0 15px rgba(0, 255, 157, 0.8);
            letter-spacing: 5px; pointer-events: none;
        }

        .scattered-btn {
            position: absolute; display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: transform 0.3s; animation: float 4s infinite ease-in-out;
        }
        .scattered-btn:hover { transform: scale(1.1); filter: drop-shadow(0 0 20px #00FF9D); }
        .btn-icon {
            background: rgba(0, 40, 20, 0.4); border: 2px solid #00FF9D; border-radius: 50%;
            width: 110px; height: 110px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.3); margin-bottom: 15px; overflow: hidden;
        }
        .btn-icon img { width: 75%; height: 75%; object-fit: contain; pointer-events: none; }
        .btn-text {
            background: rgba(0, 20, 10, 0.8); padding: 5px 15px; border-radius: 20px;
            border: 1px dashed #00FF9D; color: #00FF9D; font-weight: bold; font-size: 0.85rem;
        }

        #btn-location { top: 20%; left: 15%; animation-delay: 0s; }
        #btn-world { top: 40%; right: 18%; animation-delay: 1s; }
        #btn-character { bottom: 25%; left: 28%; animation-delay: 2s; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* 4. [중요] 디테일 크게 보기 & 부채꼴 슬라이더 구조 */
        .content-panel {
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 157, 0.4); box-shadow: 0 0 30px rgba(0, 255, 157, 0.1);
            width: 95%; max-width: 1200px; height: 85vh; margin: 6vh auto 0;
            border-radius: 15px; position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }
        
        .content-header { padding: 30px 40px 10px 40px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
        .content-header h2 { color: #00FF9D; margin: 0; padding-bottom: 10px; text-shadow: 0 0 10px rgba(0,255,157,0.5); }
        
        .close-btn {
            background: transparent; color: #00FF9D; border: 1px solid #00FF9D; padding: 5px 15px; cursor: pointer;
            transition: all 0.2s;
        }
        .close-btn:hover { background: #00FF9D; color: #000; box-shadow: 0 0 15px #00FF9D; }

        /* == 중앙 상단 대형 디테일 팝업 == */
        .large-wanted-view {
            width: 90%; max-width: 900px; height: 50vh; margin: 2vh auto; 
            background: rgba(0,10,5,0.7); border: 2px solid #00FF9D; border-radius: 10px;
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.3);
            display: none; /* 평소엔 숨김 */
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%) translateY(-20px);
            z-index: 50; padding: 20px;
            color: white; backdrop-filter: blur(20px);
            opacity: 0; transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .large-wanted-view.open-detail { display: flex; opacity: 1; transform: translateX(-50%) translateY(0px); }

        .large-wanted-view .view-close-btn { position: absolute; top: 15px; right: 20px; font-weight: bold; color: #00FF9D; cursor: pointer; }
        .large-wanted-view .large-info-text { margin-top: 20px; color: #FFFFFF; font-size: 1.1rem; }
        .large-wanted-view .large-wanted-image { width: 300px; height: 100%; background: #111; margin-right: 30px; }

        /* == [핵심] 부채꼴 드래그 슬라이더 == */
        .wanted-gallery-container { flex-grow: 1; overflow: hidden; position: relative; margin-top: auto; }

        .wanted-gallery {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 20px; /* 카드가 겹치도록 좁게 설정 */
            padding: 40px 100px;
            height: 100%;
            scrollbar-width: none;
            box-sizing: border-box;
            cursor: grab;
            scroll-behavior: smooth;
        }
        .wanted-gallery.active-drag { cursor: grabbing; scroll-snap-type: none; scroll-behavior: auto; }
        .wanted-gallery::-webkit-scrollbar { display: none; }

        /* 부채꼴 곡선을 만들기 위한 가상의 곡선형 바닥 (치트키) */
        .wanted-gallery::after { content: ''; display: block; position: absolute; bottom: 0; left: 0; width: 100%; height: 15vh; border-radius: 50% 50% 0 0; background: rgba(0,20,10,0.3); border-top: 2px solid rgba(0,255,157,0.3); box-shadow: 0 -10px 20px rgba(0,255,157,0.1); pointer-events: none; }

        .wanted-gallery::before,
        .wanted-gallery::after { content: ''; flex: 0 0 calc(50% - 150px); } /* 첫/마지막 카드 중앙 정렬 */

        .wanted-poster {
            flex: 0 0 250px; height: fit-content; scroll-snap-align: center;
            background: #0a0a0a; border: 3px solid #00FF9D; border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.4); display: flex; flex-direction: column; padding: 10px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s, filter 0.3s;
            user-select: none;
            
            /* [마법의 공식 뼈대] 각 카드의 개별 부채꼴 각도 설정 */
            transform-origin: bottom center; /* 아래쪽을 기준으로 회전 */
        }
        /* 드래그 중이 아닐 때만 Hover 효과 */
        .wanted-gallery:not(.active-drag) .wanted-poster:hover { transform: translateY(-20px) scale(1.1) !important; box-shadow: 0 0 50px rgba(0, 255, 157, 0.6); z-index: 10; filter: brightness(1.2); }

        .wanted-header { text-align: center; font-weight: 900; font-size: 1.5rem; color: #00FF9D; letter-spacing: 2px; margin-bottom: 5px; border-bottom: 1px dashed #00FF9D; }
        .wanted-status { text-align: center; font-size: 0.7rem; color: #FF3B3B; font-weight: bold; margin-bottom: 5px; }
        
        .wanted-image-frame {
            width: 100%; height: 220px; background: #111; border: 1px solid rgba(0, 255, 157, 0.2);
            margin-bottom: 10px; overflow: hidden; position: relative;
        }
        .wanted-image-frame img { width: 100%; height: 100%; object-fit: cover; filter: sepia(0.5) hue-rotate(100deg) contrast(1.2) brightness(0.9); pointer-events: none; }
        
        .wanted-info { border-top: 1px solid rgba(0, 255, 157, 0.4); padding-top: 10px; }
        .wanted-name { font-size: 1.2rem; font-weight: bold; text-align: center; color: #FFFFFF; margin-bottom: 5px; text-shadow: 0 0 5px white; }
        .wanted-reward { font-size: 1.1rem; color: #00FF9D; text-align: center; font-family: 'Courier New', monospace; font-weight: bold; }
        .wanted-reward span { font-size: 0.7rem; color: #8A9BB4; margin-right: 3px; }

        /* 5. AI 비서 이브 (최상단 고정) */
        .ai-assistant {
            position: fixed; top: 20px; right: 20px; display: flex; align-items: center;
            background: rgba(0, 15, 10, 0.9); backdrop-filter: blur(8px); border: 1px solid #00FF9D;
            border-right: 4px solid #00FF9D; padding: 15px 20px; border-radius: 10px 0 0 10px;
            z-index: 1000; transform: translateX(120%); animation: slideIn 0.8s ease forwards; animation-delay: 1.2s;
        }
        .ai-avatar { background: #00FF9D; color: #000; font-weight: 900; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; border-radius: 5px; margin-right: 15px; box-shadow: 0 0 10px #00FF9D; }
        .ai-text strong { color: #00FF9D; font-size: 0.75rem; display: block; }
        .ai-text span { color: #E0FFF2; font-size: 0.95rem; }
        @keyframes slideIn { 0% { transform: translateX(120%); } 100% { transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="ai-assistant">
        <div class="ai-avatar">EVE</div>
        <div class="ai-text"><strong>SYSTEM MESSAGE</strong><span>"8명의 고위험 수배자 데이터를 복원했습니다."</span></div>
    </div>

    <div id="main-screen" class="screen active">
        <h1 class="main-title">BOUNTY HUNTER TERMINAL</h1>
        <div id="btn-location" class="scattered-btn" onclick="openScreen('location-screen')">
            <div class="btn-icon"><img src="icon_planet.png" alt="Planet"></div>
            <div class="btn-text">장소 데이터베이스</div>
        </div>
        <div id="btn-world" class="scattered-btn" onclick="openScreen('world-screen')">
            <div class="btn-icon"><img src="icon_book.png" alt="Book"></div>
            <div class="btn-text">세계관 및 역사</div>
        </div>
        <div id="btn-character" class="scattered-btn" onclick="openScreen('character-screen')">
            <div class="btn-icon"><img src="icon_wanted.png" alt="Wanted"></div>
            <div class="btn-text">수배자 명부</div>
        </div>
    </div>

    <div id="character-screen" class="screen">
        <div class="content-panel">
            <div class="content-header">
                <h2>📜 초은하 현상수배지 데이터베이스</h2>
                <button class="close-btn" onclick="openScreen('main-screen')">X RETURN</button>
            </div>

            <div class="large-wanted-view" id="large-view">
                <span class="view-close-btn" onclick="closeLargeView()">[X CLOSE]</span>
                <div class="large-wanted-image">
                    <img id="large-image" src="" alt="Target Detail" style="width:100%;height:100%;object-fit:cover; filter:sepia(0.3) hue-rotate(100deg);">
                </div>
                <div class="large-info-text">
                    <h1 id="large-name" style="color:#00FF9D;margin-top:0;"></h1>
                    <p id="large-bio"></p>
                    <p style="color:#8A9BB4; font-size:0.9rem; font-family:monospace">보상금: <span id="large-reward" style="color:white;"></span></p>
                </div>
            </div>
            
            <div class="wanted-gallery-container">
                <div class="wanted-gallery" id="drag-gallery">
                    
                    </div>
            </div>
        </div>
    </div>

    <div id="world-screen" class="screen"><div class="content-panel"><div class="content-header"><h2>📖 세계관 및 역사</h2><button class="close-btn" onclick="openScreen('main-screen')">X RETURN</button></div><p style="padding:40px;">연대기 복원 중...</p></div></div>
    <div id="location-screen" class="screen"><div class="content-panel"><div class="content-header"><h2>🪐 장소 소개</h2><button class="close-btn" onclick="openScreen('main-screen')">X RETURN</button></div><p style="padding:40px;">항성 좌표 데이터 수신 중...</p></div></div>

    <script>
        // 1. 수배자 데이터 (원하시는 대로 수정하세요)
        const bountyData = [
            { id: 1, name: '실버 팽', reward: '50,000,000', img: 'char1.png', bio: '은하 연방 은행 강탈 주범. 교활하고 속도가 매우 빠름.' },
            { id: 2, name: '네온 쉐도우', reward: '120,000,000', img: 'char2.png', bio: '네온 콜로니 암살 사건 용의자. 소리 없이 그림자 속을 이동함.' },
            { id: 3, name: '크림슨 해커', reward: '85,000,000', img: 'char3.png', bio: '기간 시설 양자 서버 불법 침입. 전산망 폭주를 유도함.' },
            { id: 4, name: '보이드 워커', reward: '200,000,000', img: 'char4.png', bio: '블랙홀 코어 불법 밀매. 은하계 전체를 위협하는 무법자.' },
            { id: 5, name: '네뷸라 팬텀', reward: '75,000,000', img: 'char5.png', bio: '성운 구역 불법 도박장 운영 및 마약 밀반입. 신원 미상.' },
            { id: 6, name: '스타 이터', reward: '500,000,000', img: 'char6.png', bio: '멸망한 행성의 코어를 삼키는 미지의 거대 괴생명체.' },
            { id: 7, name: '크로노스 씨프', reward: '150,000,000', img: 'char7.png', bio: '차원 이동 기술 무단 유출. 길드의 시간을 훔치는 범죄자.' },
            { id: 8, name: '글리치 위버', reward: '90,000,000', img: 'char8.png', bio: '현실 조작 시스템 글리치 유발. 대상의 인지 능력을 폭파함.' }
        ];

        // 2. [핵심] 자바스크립트로 부채꼴 명부 촤르르 생성
        const gallery = document.getElementById('drag-gallery');
        
        bountyData.forEach((data, index) => {
            const poster = document.createElement('div');
            poster.className = 'wanted-poster';
            poster.id = `target-${data.id}`;
            // 클릭하면 중앙 디테일 창을 띄웁니다
            poster.setAttribute('onclick', `openLargeView(${data.id})`);

            // [마법의 공식 2] 카드마다 고유한 부채꼴 각도를 줍니다. (예: -20도에서 20도로 펼침)
            // 8개이므로 중앙에서 멀어질수록 각도를 크게 줍니다
            const rotation = (index - 3.5) * 6; // 중앙을 기준으로 각도를 넓게 펼침
            poster.style.transform = `rotate(${rotation}deg) translateY(${Math.abs(rotation) * -0.2}px)`;

            poster.innerHTML = `
                <div class="wanted-header">WANTED</div>
                <div class="wanted-status">DEAD OR ALIVE</div>
                <div class="wanted-image-frame"><img src="${data.img}" alt="${data.name}"></div>
                <div class="wanted-info">
                    <div class="wanted-name">${data.name}</div>
                    <div class="wanted-reward"><span>REWARD:</span> ${data.reward} ₵</div>
                </div>
            `;
            gallery.appendChild(poster);
        });

        // 3. 화면 전환
        function openScreen(targetId) {
            let screens = document.querySelectorAll('.screen');
            screens.forEach(function(screen) { screen.classList.remove('active'); });
            document.getElementById(targetId).classList.add('active');
            closeLargeView(); // 다른 화면으로 갈 땐 디테일 창을 닫음
            if(targetId === 'character-screen') { gallery.scrollLeft = 0; snapToCenter(); }
        }

        // 4. [요구사항] 중앙 상단 디테일 크게 보기
        const largeView = document.getElementById('large-view');
        function openLargeView(targetId) {
            const data = bountyData.find(item => item.id === targetId);
            if (!data) return;

            document.getElementById('large-image').src = data.img;
            document.getElementById('large-name').textContent = data.name;
            document.getElementById('large-bio').textContent = data.bio;
            document.getElementById('large-reward').textContent = `${data.reward} ₵`;

            largeView.classList.add('open-detail'); // 짠! 하고 나타남
        }
        function closeLargeView() { largeView.classList.remove('open-detail'); }

        // 5. 마우스 드래그 & 스무스 스냅 (손맛) 매직 (이전 단계 유지)
        const slider = document.getElementById('drag-gallery');
        let isDown = false;
        let startX;
        let scrollLeft;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            slider.classList.add('active-drag');
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
            closeLargeView(); // 드래그 시작할 땐 디테일 창을 닫아 집중하게 함
        });

        function snapToCenter() {
            const cards = slider.querySelectorAll('.wanted-poster');
            let minDistance = Infinity;
            let closestScrollX = 0;
            const containerCenter = slider.getBoundingClientRect().left + (slider.offsetWidth / 2);

            cards.forEach(card => {
                const cardCenter = card.getBoundingClientRect().left + (card.offsetWidth / 2);
                const distance = Math.abs(containerCenter - cardCenter);
                if (distance < minDistance) {
                    minDistance = distance;
                    closestScrollX = card.offsetLeft - (slider.offsetWidth / 2) + (card.offsetWidth / 2);
                }
            });
            slider.scrollTo({ left: closestScrollX, behavior: 'smooth' });
        }

        slider.addEventListener('mouseleave', () => { if (!isDown) return; isDown = false; slider.classList.remove('active-drag'); snapToCenter(); });
        slider.addEventListener('mouseup', () => { if (!isDown) return; isDown = false; slider.classList.remove('active-drag'); snapToCenter(); });
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 1.5; // 끌어당기는 속도
            slider.scrollLeft = scrollLeft - walk;
        });
    </script>
</body>
</html>
