<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초은하 현상금 사냥꾼 길드</title>
    <style>
        /* 1. 전체 민트 테마 및 스크롤 금지 설정 */
        body {
            margin: 0;
            padding: 0;
            background-image: url('bg.png'); /* 배경 이미지 잊지 마세요! */
            background-size: cover; 
            background-position: center; 
            background-color: #05120E; /* 아주 어두운 딥 민트/블랙 */
            color: #E0FFF2; /* 텍스트도 연한 민트빛 */
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden; /* ★치트키: 스크롤을 완전히 없애버림 */
            user-select: none; /* 드래그 방지 (게임 화면처럼) */
        }

        /* 2. 화면 공통 속성 (전환 효과) */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out; /* 부드러운 화면 전환(페이드인) */
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 3. 메인 화면: 흩뿌려진 UI 요소들 */
        .main-title {
            position: absolute;
            top: 5%;
            width: 100%;
            text-align: center;
            font-size: 2.5rem;
            color: #00FF9D;
            text-shadow: 0 0 15px rgba(0, 255, 157, 0.8);
            letter-spacing: 5px;
            pointer-events: none;
        }

        /* 흩뿌려진 버튼들의 공통 디자인 */
        .scattered-btn {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s, filter 0.3s;
            animation: float 4s infinite ease-in-out; /* 둥둥 떠다니는 애니메이션 */
        }

        .scattered-btn:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 20px #00FF9D); /* 마우스 올리면 민트색으로 강하게 빛남 */
        }

        .btn-icon {
            font-size: 4rem; /* 나중에 이 자리에 이미지 태그(<img>)를 넣으셔도 됩니다! */
            background: rgba(0, 40, 20, 0.6);
            border: 2px solid #00FF9D;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 15px rgba(0, 255, 157, 0.5);
            margin-bottom: 10px;
        }

        .btn-text {
            background: rgba(0, 20, 10, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px dashed #00FF9D;
            color: #00FF9D;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* 각 버튼의 불규칙한 위치 설정 */
        #btn-location {
            top: 20%;
            left: 15%;
            animation-delay: 0s;
        }

        #btn-world {
            top: 40%;
            right: 18%;
            animation-delay: 1s; /* 떠다니는 타이밍을 엇갈리게 설정 */
        }

        #btn-character {
            bottom: 25%;
            left: 28%;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* 4. 서브 화면 (상세 정보 창) */
        .content-panel {
            background: rgba(0, 20, 10, 0.85); /* 진한 반투명 민트 블랙 */
            backdrop-filter: blur(15px);
            border: 1px solid #00FF9D;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.3);
            width: 80%;
            max-width: 900px;
            height: 70vh;
            margin: 10vh auto 0;
            padding: 40px;
            border-radius: 10px;
