<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초은하 현상금 사냥꾼 길드</title>
    <style>
        /* 우주/홀로그램 컨셉의 기본 디자인 설정 */
        body {
            margin: 0;
            padding: 0;
            background-color: #05050A; /* 아주 깊고 어두운 우주색 */
            background-image: radial-gradient(circle at 50% 50%, #111324 0%, #05050A 100%);
            color: #E0E5FF; /* 홀로그램 느낌의 텍스트 색상 */
            font-family: 'Malgun Gothic', sans-serif;
        }

        /* 상단 네비게이션 탭 (메뉴바) */
        nav {
            display: flex;
            justify-content: center;
            background: rgba(10, 15, 30, 0.8);
            border-bottom: 2px solid #00F0FF; /* 네온 블루 포인트 */
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            padding: 15px 0;
            position: sticky;
            top: 0;
        }

        nav a {
            color: #00F0FF;
            text-decoration: none;
            margin: 0 20px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: #FFFFFF;
            text-shadow: 0 0 10px #00F0FF, 0 0 20px #00F0FF;
        }

        /* 메인 콘텐츠 영역 */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        /* 대문 타이틀 */
        .title-box {
            text-align: center;
            margin-bottom: 50px;
        }

        .title-box h1 {
            font-size: 3rem;
            color: #FF0055; /* 네온 핑크/레드 포인트 */
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.7);
            margin: 0;
            letter-spacing: 5px;
        }

        .title-box p {
            color: #8A9BB4;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* 정보 패널 (세계관, 장소, 캐릭터가 들어갈 상자) */
        .panel {
            background: rgba(20, 25, 45, 0.6);
            border: 1px solid #3A4B7C;
            border-left: 5px solid #00F0FF;
            padding: 30px;
            margin-bottom: 30px;
            border-radius: 0 15px 15px 0;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .panel h2 {
            margin-top: 0;
            color: #FFFFFF;
            border-bottom: 1px dashed #3A4B7C;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#world">세계관 및 역사</a>
        <a href="#location">장소 소개</a>
        <a href="#character">캐릭터 소개</a>
    </nav>

    <div class="container">
        <div class="title-box">
            <h1>BOUNTY HUNTERS</h1>
            <p>초은하 현상금 사냥꾼 데이터베이스 터미널에 오신 것을 환영합니다.</p>
        </div>

        <div id="world" class="panel">
            <h2>🌍 세계관 및 역사 소개</h2>
            <p>이곳에 은하계의 패권 다툼, 현상금 사냥꾼 길드가 생겨난 기원 등 웅장한 배경 스토리를 채워 넣습니다.</p>
        </div>

        <div id="location" class="panel">
            <h2>🪐 장소 소개</h2>
            <p>네온사인이 번쩍이는 스페이스 콜로니, 혹은 버려진 우주 정거장 등 주 무대가 되는 행성이나 구역을 설명합니다.</p>
        </div>

        <div id="character" class="panel">
            <h2>👥 캐릭터 소개</h2>
            <p>여기에 캐릭터 일러스트 갤러리와 홀로그램 팝업 형태의 상세 프로필(능력치, 종족, 무기 등)이 들어갈 예정입니다.</p>
        </div>
    </div>

</body>
</html>
